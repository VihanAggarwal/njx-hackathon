       root and open <code>/eval/dashboard.html</code>.<br>${e}</div>`); });
}

getData(function(results, competitive){
  const cfgs = results.configs || {};
  const comp = (competitive && competitive.defenses) || {};
  const man = results.manifest || (competitive && competitive.manifest) || {};
  document.getElementById("manifest").textContent =
    `provider=${man.provider||"?"} (${man.mode||"?"}) · seed=${man.seed} · ${man.n_items} items · `+
    `${man.timestamp||""}`;

  // summary stats
  const dmFinal = (cfgs["6_full_post_hardening"]||{}).asr;
  const compAvail = Object.entries(comp).filter(([n,m])=>m.available && !n.includes("DUALMIND"));
  const bestComp = compAvail.length ? Math.min(...compAvail.map(([n,m])=>m.asr)) : null;
  const fpr = (cfgs["6_full_post_hardening"]||{}).fpr;
  const red = (bestComp!=null && dmFinal!=null) ? (bestComp - dmFinal) : null;
  const stats = [["DUALMIND ASR", dmFinal!=null?dmFinal.toFixed(3):"–"],
    ["Best competitor ASR", bestComp!=null?bestComp.toFixed(3):"–"],
    ["ASR reduction", red!=null?(red>=0?"-":"")+(Math.abs(red)).toFixed(3):"–"],
    ["DUALMIND FPR", fpr!=null?fpr.toFixed(3):"–"]];
  document.getElementById("stats").innerHTML = stats.map(s=>
    `<div class="stat"><div class="v">${s[1]}</div><div class="l">${s[0]}</div></div>`).join("");
  document.getElementById("provnote").textContent =
    (man.mode==="MOCK"? "NOTE: MOCK provider — illustrative numbers. Set ANTHROPIC_API_KEY for real LLM results. " : "")
    + "Synthetic datasets are clearly labeled; see README for provenance.";

  const keys = CONFIG_ORDER.filter(k=>cfgs[k]);
  const lbl = keys.map(k=>CONFIG_LABELS[k]);

  // 1 ASR by config
  Plotly.newPlot(card("ablation","g1"), [{type:"bar", x:lbl,
    y:keys.map(k=>cfgs[k].asr), marker:{color:DM_PURPLE},
    error_y:{type:"data", symmetric:false,
      array:keys.map(k=>cfgs[k].asr_ci[1]-cfgs[k].asr),
      arrayminus:keys.map(k=>cfgs[k].asr-cfgs[k].asr_ci[0])},
    text:keys.map(k=>cfgs[k].asr.toFixed(2)), textposition:"outside"}],
    Object.assign({}, LAYOUT, {title:"ASR by configuration (95% CI)", yaxis:{title:"ASR", range:[0,1.1]}}), {responsive:true});

  // 2 per-class heatmap (configs)
  heat("ablation","g2", keys.map(k=>CONFIG_LABELS[k]),
    keys.map(k=>CLASSES.map(c=>cfgs[k].per_class_asr[c] ?? null)),
    "Per-attack-class ASR (DUALMIND configs)");

  // 3 self-hardening
  const h = results.self_hardening || {};
  if (h.asr_per_round){
    Plotly.newPlot(card("ablation","g3"), [{x:h.asr_per_round.map((_,i)=>i),
      y:h.asr_per_round, mode:"lines+markers", line:{color:"#b39ddb",width:3}, fill:"tozeroy",
      fillcolor:"rgba(84,39,143,0.25)", name:"ASR"}],
      Object.assign({},LAYOUT,{title:"Self-hardening: ASR over red-team rounds",
        xaxis:{title:"round"}, yaxis:{title:"ASR"}}), {responsive:true});
  }

  // 4 ROC, 5 PR
  Plotly.newPlot(card("ablation","g4"), keys.filter(k=>cfgs[k].roc).map((k,i)=>(
    {x:cfgs[k].roc.fpr, y:cfgs[k].roc.tpr, mode:"lines", line:{color:DM_PURPLE[i]},
     name:`${CONFIG_LABELS[k]} (AUC=${cfgs[k].roc.auc})`}))
    .concat([{x:[0,1],y:[0,1],mode:"lines",line:{dash:"dash",color:"#888"},name:"chance"}]),
    Object.assign({},LAYOUT,{title:"ROC curves",xaxis:{title:"FPR"},yaxis:{title:"TPR"}}),{responsive:true});
  Plotly.newPlot(card("ablation","g5"), keys.filter(k=>cfgs[k].pr).map((k,i)=>(
    {x:cfgs[k].pr.recall, y:cfgs[k].pr.precision, mode:"lines", line:{color:DM_PURPLE[i]},
     name:`${CONFIG_LABELS[k]} (AP=${cfgs[k].pr.ap})`})),
    Object.assign({},LAYOUT,{title:"Precision-Recall curves",xaxis:{title:"Recall"},yaxis:{title:"Precision"}}),{responsive:true});

  // 6 calibration
  const calTraces=[{x:[0,1],y:[0,1],mode:"lines",line:{dash:"dash",color:"#888"},name:"perfect"}];
  if (cfgs["2_prefilter_only"] && cfgs["2_prefilter_only"].reliability)
    calTraces.push(relTrace("Pre-filter", cfgs["2_prefilter_only"], "#b39ddb"));
  Object.entries(comp).forEach(([n,m],i)=>{ if(m.available&&m.reliability&&!n.includes("DUALMIND"))
    calTraces.push(relTrace(n, m, ["#e08214","#fdb863","#b35806"][i%3])); });
  Plotly.newPlot(card("ablation","g6"), calTraces,
    Object.assign({},LAYOUT,{title:"Calibration reliability",xaxis:{title:"predicted"},yaxis:{title:"observed"}}),{responsive:true});

  // 7 latency (p50/p95/p99 grouped)
  Plotly.newPlot(card("ablation","g7"), ["p50","p95","p99"].map(p=>(
    {type:"bar",name:p,x:lbl,y:keys.map(k=>cfgs[k].latency[p])})),
    Object.assign({},LAYOUT,{barmode:"group",title:"Latency per request (ms)",yaxis:{title:"ms"}}),{responsive:true});

  // 8 cost vs security
  Plotly.newPlot(card("ablation","g8"), [{x:keys.map(k=>cfgs[k].cost_per_1000_usd),
    y:keys.map(k=>1-cfgs[k].asr), mode:"markers+text", text:lbl, textposition:"top center",
    marker:{size:14,color:DM_PURPLE}}],
    Object.assign({},LAYOUT,{title:"Cost vs security",xaxis:{title:"cost / 1000 req (USD)"},
      yaxis:{title:"1 - ASR"}}),{responsive:true});

  // 9 confusion (grouped)
  Plotly.newPlot(card("ablation","g9"), ["TP","FN","FP","TN"].map(c=>(
    {type:"bar",name:c,x:lbl,y:keys.map(k=>cfgs[k].confusion[c])})),
    Object.assign({},LAYOUT,{barmode:"stack",title:"Confusion counts by config"}),{responsive:true});

  // 10 FPR vs ASR
  Plotly.newPlot(card("ablation","g10"), [{x:keys.map(k=>cfgs[k].fpr), y:keys.map(k=>cfgs[k].asr),
    mode:"markers+text", text:lbl, textposition:"top center", marker:{size:14,color:DM_PURPLE}}],
    Object.assign({},LAYOUT,{title:"FPR vs ASR (bottom-left ideal)",xaxis:{title:"FPR"},yaxis:{title:"ASR"}}),{responsive:true});

  // ---- competitive ----
  const cAvail = Object.entries(comp).filter(([n,m])=>m.available);
  const sorted = cAvail.slice().sort((a,b)=>b[1].asr-a[1].asr);
  // 11 leaderboard
  Plotly.newPlot(card("competitive","c11",true), [{type:"bar",orientation:"h",
    y:sorted.map(r=>shortName(r[0])), x:sorted.map(r=>r[1].asr),
    marker:{color:sorted.map(r=>r[0].includes("DUALMIND")?DM_PURPLE[5]:"#7f7f7f")},
    error_x:{type:"data",symmetric:false,array:sorted.map(r=>r[1].asr_ci[1]-r[1].asr),
      arrayminus:sorted.map(r=>r[1].asr-r[1].asr_ci[0])},
    text:sorted.map(r=>r[1].asr.toFixed(2)),textposition:"outside"}],
    Object.assign({},LAYOUT,{title:"Head-to-head ASR leaderboard",xaxis:{title:"ASR",range:[0,1.1]}}),{responsive:true});
  // 12 security map
  Plotly.newPlot(card("competitive","c12"), cAvail.map(([n,m])=>(
    {x:[m.fpr],y:[m.asr],mode:"markers+text",text:[shortName(n)],textposition:"top center",
     name:shortName(n),
     marker:{size:n.includes("DUALMIND")?22:12,symbol:n.includes("DUALMIND")?"star":"circle",
       color:n.includes("DUALMIND")?DM_PURPLE[5]:"#7f7f7f"}})),
    Object.assign({},LAYOUT,{title:"2D security map (bottom-left ideal)",showlegend:false,
      xaxis:{title:"FPR",range:[-0.03,1]},yaxis:{title:"ASR",range:[-0.03,1]}}),{responsive:true});
  // 13 competitive heatmap
  heat("competitive","c13", sorted.map(r=>shortName(r[0])),
    sorted.map(r=>CLASSES.map(c=>r[1].per_class_asr[c] ?? null)),
    "Per-attack-class ASR: DUALMIND vs competitors", true);
  // 14 radar
  const maxp95 = Math.max(...cAvail.map(([n,m])=>m.latency.p95), 1);
  const dm = cAvail.filter(r=>r[0].includes("DUALMIND"));
  const top3 = cAvail.filter(r=>!r[0].includes("DUALMIND")).sort((a,b)=>a[1].asr-b[1].asr).slice(0,3);
  const axes=["catch (1-ASR)","low FPR","multi-hop def","latency eff","calib (1-ECE)"];
  Plotly.newPlot(card("competitive","c14"), dm.concat(top3).map(([n,m])=>{
    const mh=["multi_hop_1","multi_hop_2","multi_hop_3"].map(c=>m.per_class_asr[c]).filter(x=>x!=null);
    const mhDef=mh.length?1-mh.reduce((a,b)=>a+b)/mh.length:1;
    const v=[1-m.asr,1-m.fpr,mhDef,1-m.latency.p95/maxp95,1-(m.ece||0)];
    return {type:"scatterpolar",r:v.concat([v[0]]),theta:axes.concat([axes[0]]),fill:"toself",
      name:shortName(n),opacity:n.includes("DUALMIND")?0.85:0.5};}),
    Object.assign({},LAYOUT,{title:"Capability radar (outer=better)",
      polar:{bgcolor:"#1a1d27",radialaxis:{range:[0,1]}}}),{responsive:true});
  // 15 latency vs accuracy
  Plotly.newPlot(card("competitive","c15"), cAvail.map(([n,m])=>(
    {x:[m.latency.p95],y:[1-m.asr],mode:"markers+text",text:[shortName(n)],textposition:"top center",
     name:shortName(n),
     marker:{size:n.includes("DUALMIND")?20:11,symbol:n.includes("DUALMIND")?"star":"circle",
       color:n.includes("DUALMIND")?DM_PURPLE[5]:"#7f7f7f"}})),
    Object.assign({},LAYOUT,{title:"Latency vs accuracy",showlegend:false,
      xaxis:{title:"p95 latency (ms)"},yaxis:{title:"1 - ASR"}}),{responsive:true});

  function relTrace(name,m,color){ const r=m.reliability;
    const pts=r.confidence.map((c,i)=>[c,r.accuracy[i],r.counts[i]]).filter(p=>p[2]>0);
    return {x:pts.map(p=>p[0]),y:pts.map(p=>p[1]),mode:"lines+markers",line:{color},
      name:`${shortName(name)} (ECE=${(m.ece||0).toFixed(3)})`}; }
});

function shortName(n){ return n.replace(" (reimplementation)","*").replace("ProtectAI ","").slice(0,34); }
function heat(tab,id,rows,z,title,full){
  Plotly.newPlot(card(tab,id,full), [{z:z,x:CLASSES,y:rows,type:"heatmap",
    colorscale:[[0,"#1a9850"],[0.5,"#ffffbf"],[1,"#d73027"]],zmin:0,zmax:1,
    hoverongaps:false, colorbar:{title:"ASR"}}],
    Object.assign({},LAYOUT,{title:title, xaxis:{tickangle:-40}}),{responsive:true});
}

// tab switching
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  const tab=t.dataset.tab;
  document.getElementById("ablation").style.display = tab==="ablation"?"grid":"none";
  document.getElementById("competitive").style.display = tab==="competitive"?"grid":"none";
  window.dispatchEvent(new Event("resize"));
});
</script>
</body>
